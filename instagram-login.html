<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Style Secure Login</title>

<style>
body {
    font-family: Arial;
    background: #fafafa;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    width: 320px;
    background: white;
    border: 1px solid #dbdbdb;
    padding: 30px;
    text-align: center;
}

.logo {
    font-size: 30px;
    font-weight: bold;
    margin-bottom: 20px;
}

.input-box {
    position: relative;
}

input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border: 1px solid #dbdbdb;
}

.eye {
    position: absolute;
    right: 10px;
    top: 14px;
    cursor: pointer;
    font-size: 14px;
    color: #555;
}

button {
    width: 100%;
    padding: 10px;
    background: #0095f6;
    color: white;
    border: none;
    margin-top: 10px;
    cursor: pointer;
}

.output {
    margin-top: 15px;
    background: #eee;
    padding: 10px;
    display: none;
}
</style>
</head>

<body>

<div class="box">
    <div class="logo">Instagram</div>

    <input type="text" id="username" placeholder="Phone, username, or email">

    <div class="input-box">
        <input type="password" id="password" placeholder="Password">
        <span class="eye" onclick="togglePassword()">👁️</span>
    </div>

    <button onclick="login()">Log In</button>

    <div class="output" id="out"></div>
</div>

<script>
function togglePassword() {
    let passField = document.getElementById("password");
    if (passField.type === "password") {
        passField.type = "text";
    } else {
        passField.type = "password";
    }
}

function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    // Save data locally
    localStorage.setItem("username", user);
    localStorage.setItem("password", pass);

    let box = document.getElementById("out");
    box.style.display = "block";

    box.innerHTML = `
        <strong>Login Saved ✅</strong><br><br>
        Username: ${user} <br>
        Password: 🔒 Hidden
    `;
}
</script>

</body>
</html>
